expectation_suite_name: fact_claims_suite
expectations:
  - expectation_type: expect_column_values_to_not_be_null
    kwargs:
      column: claim_id
  - expectation_type: expect_column_values_to_be_between
    kwargs:
      column: paid_amount
      min_value: 0
  - expectation_type: expect_column_values_to_be_in_set
    kwargs:
      column: claim_status
      value_set: [Paid, Denied, Reversed, Duplicate Review]
  - expectation_type: expect_column_values_to_not_be_null
    kwargs:
      column: provider_key
